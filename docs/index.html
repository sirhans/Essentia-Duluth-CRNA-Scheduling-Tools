<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Essentia Duluth CRNA Scheduling Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="download-panel" aria-labelledby="title">
        <img class="app-icon" src="assets/icon-source.png" alt="" />
        <div class="intro">
          <p class="eyebrow">Desktop scheduler</p>
          <h1 id="title">Essentia Duluth CRNA Scheduling Tool</h1>
          <p class="summary">
            Download the latest release package for your computer.
          </p>
        </div>

        <div class="downloads" aria-label="Downloads">
          <a class="download-link" id="mac-download" href="https://github.com/sirhans/Essentia-Duluth-CRNA-Scheduling-Tools/releases/latest">
            <span class="platform">macOS</span>
            <span class="file-type">DMG installer</span>
          </a>
          <a class="download-link" id="windows-download" href="https://github.com/sirhans/Essentia-Duluth-CRNA-Scheduling-Tools/releases/latest">
            <span class="platform">Windows</span>
            <span class="file-type">EXE installer</span>
          </a>
        </div>

        <p class="release-note" id="release-note">
          Checking the latest release...
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
